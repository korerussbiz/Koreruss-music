<!DOCTYPE html>
<html>
<head>
    <title>Koreruss NFT Gallery</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .nft-card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 250px; padding: 10px; text-align: center; }
        .nft-card img { max-width: 100%; border-radius: 8px; max-height: 250px; object-fit: contain; }
        .nft-card h3 { font-size: 1.1em; margin: 10px 0; }
        .nft-card a { display: inline-block; margin-top: 10px; padding: 5px 10px; background: #2081e2; color: white; text-decoration: none; border-radius: 5px; }
        .nft-card a:hover { background: #0a5cb0; }
        .error { color: red; text-align: center; }
        .loading { text-align: center; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>Koreruss NFT Collection</h1>
    <div id="gallery" class="gallery loading">Loading NFTs...</div>
    <script>
        // Your wallet address
        const walletAddress = "0xCf974b9e14766f839D8C59bDA1D4Dff3CF3f8b33";
        // Using a public Alchemy API key for demo. You can replace with your own.
        const apiKey = "demo"; 
        
        // URL to fetch NFTs for your wallet on Polygon mainnet
        const apiUrl = `https://polygon-mainnet.g.alchemy.com/nft/v2/${apiKey}/getNFTsForOwner?owner=${walletAddress}&withMetadata=true&pageSize=100`;

        async function fetchAndDisplayNFTs() {
            const galleryDiv = document.getElementById("gallery");
            try {
                galleryDiv.innerHTML = '<div class="loading">Fetching your NFTs...</div>';
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                const nfts = data.ownedNfts;
                if (!nfts || nfts.length === 0) {
                    galleryDiv.innerHTML = "<p class='error'>No NFTs found for this wallet address.</p>";
                    return;
                }
                galleryDiv.innerHTML = "";
                for (const nft of nfts) {
                    // Extract metadata
                    const name = nft.title || nft.contract.name || `Token ${nft.id.tokenId}`;
                    let imageUrl = "https://via.placeholder.com/250?text=No+Image";
                    if (nft.media && nft.media.length > 0 && nft.media[0].gateway) {
                        imageUrl = nft.media[0].gateway;
                    } else if (nft.metadata && nft.metadata.image) {
                        // Handle IPFS URLs
                        imageUrl = nft.metadata.image.replace('ipfs://', 'https://ipfs.io/ipfs/');
                    }
                    const tokenId = nft.id.tokenId;
                    const contractAddress = nft.contract.address;
                    const openseaUrl = `https://opensea.io/assets/matic/${contractAddress}/${tokenId}`;
                    const card = document.createElement("div");
                    card.className = "nft-card";
                    card.innerHTML = `
                        <img src="${imageUrl}" alt="${name}" onerror="this.onerror=null;this.src='https://via.placeholder.com/250?text=Failed+to+Load';">
                        <h3>${name.substring(0, 30)}</h3>
                        <p>Token ID: ${tokenId.substring(0, 10)}...</p>
                        <a href="${openseaUrl}" target="_blank">View on OpenSea</a>
                    `;
                    galleryDiv.appendChild(card);
                }
            } catch (err) {
                console.error("Error fetching NFTs:", err);
                galleryDiv.innerHTML = `<p class="error">Error loading NFTs: ${err.message}. Please check the console for more details.</p>`;
            }
        }
        fetchAndDisplayNFTs();
    </script>
</body>
</html>
