<!DOCTYPE html>
<html>
<head>
    <title>Koreruss NFT Gallery</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2772533792093956" crossorigin="anonymous"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .nft-card { background: white; border-radius: 10px; width: 250px; padding: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .nft-card img { max-width: 100%; border-radius: 8px; max-height: 250px; object-fit: contain; }
        .nft-card h3 { font-size: 1.1em; margin: 10px 0; }
        .nft-card a { display: inline-block; margin-top: 10px; padding: 5px 10px; background: #2081e2; color: white; text-decoration: none; border-radius: 5px; }
        .nft-card a:hover { background: #0a5cb0; }
        button { padding: 10px 20px; background: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        button:hover { background: #45a049; }
        #wallet-status { text-align: center; margin-bottom: 20px; font-weight: bold; }
        .ad-container { background: #f9f9f9; padding: 10px; border-radius: 8px; margin: 20px 0; text-align: center; width: 100%; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
</head>
<body>
    <ins class="adsbygoogle"
         style="display:block; text-align:center; margin-bottom:20px;"
         data-ad-format="fluid"
         data-ad-layout-key="-h2+d+5c-9-3e"
         data-ad-client="ca-pub-2772533792093956"
         data-ad-slot="2343605263"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

    <h1>Koreruss NFT Collection</h1>
    <div style="text-align: center;">
        <button id="connectWallet">Connect Wallet</button>
        <div id="wallet-status"></div>
    </div>
    <div id="gallery" class="gallery"></div>

    <script>
        const contractAddress = "0x72c997ED37F786829F01f6a73B14F6Bdd61c2B94";
        const nfts = [
            { tokenId: "4", name: "simple_20260319_112333_20260319_181630_final.mp4", image: "https://cloudflare-ipfs.com/ipfs/QmWLMEW6yvnQgG8LPEhJMjz9SNSj4ogdrasa5Sg57HLamz" },
            { tokenId: "5", name: "simple_20260319_112754_1_20260319_154356_final.mp4", image: "https://cloudflare-ipfs.com/ipfs/QmbrAWtLZZjkC6y5TyctsbMvUJuLg4hkJWxcmAVSk4bfkd" },
            { tokenId: "6", name: "simple_20260319_112754_1_20260319_181616_final.mp4", image: "https://cloudflare-ipfs.com/ipfs/QmTECLXtXCEFVBc9PfCntbFCNV9AZZeVuvFmU1S3Xi3WPJ" },
            { tokenId: "7", name: "simple_20260319_112754_1_20260319_181636_final.mp4", image: "https://cloudflare-ipfs.com/ipfs/QmZ1UBuLHXPdFRNP7DZHFoznXbfh3jQywcvTio816B5Bga" },
            { tokenId: "8", name: "simple_20260319_112333_20260319_181625_final_audio0.mp4", image: "https://cloudflare-ipfs.com/ipfs/QmP39gxFn4YyQubgindGdN2gq7m5ugwfzfftHNxeZKbSW1" },
            { tokenId: "9", name: "simple_20260319_112333_20260319_181625_final_audio0_sepia.mp4", image: "https://cloudflare-ipfs.com/ipfs/QmZBphNgjhTLZgH3h9teW23Svx3fQc5sWBXjkVaXEXs9GM" }
        ];

        const galleryDiv = document.getElementById("gallery");
        for (let i = 0; i < nfts.length; i++) {
            const nft = nfts[i];
            const card = document.createElement("div");
            card.className = "nft-card";
            card.innerHTML = `
                <img src="${nft.image}" alt="${nft.name}" onerror="this.src='https://via.placeholder.com/250'">
                <h3>${nft.name.substring(0, 30)}</h3>
                <p>Token ID: ${nft.tokenId}</p>
                <a href="https://opensea.io/assets/polygon/${contractAddress}/${nft.tokenId}" target="_blank">View on OpenSea</a>
            `;
            galleryDiv.appendChild(card);

            if ((i + 1) % 3 === 0 && i !== nfts.length - 1) {
                const adDiv = document.createElement("div");
                adDiv.className = "ad-container";
                adDiv.innerHTML = `
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-format="fluid"
                         data-ad-layout-key="-h2+d+5c-9-3e"
                         data-ad-client="ca-pub-2772533792093956"
                         data-ad-slot="2343605263"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script>
                `;
                galleryDiv.appendChild(adDiv);
            }
        }

        let provider, signer;
        const connectBtn = document.getElementById("connectWallet");
        const statusDiv = document.getElementById("wallet-status");
        connectBtn.onclick = async () => {
            if (window.ethereum) {
                try {
                    provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    const address = await signer.getAddress();
                    statusDiv.innerHTML = `✅ Connected: ${address.substring(0,6)}...${address.substring(38)}`;
                    connectBtn.disabled = true;
                } catch (err) {
                    statusDiv.innerHTML = "❌ Connection failed: " + err.message;
                }
            } else {
                statusDiv.innerHTML = "❌ Please install MetaMask.";
            }
        };
    </script>
</body>
</html>
